
{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Shield Power</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0,0,0,0.3);
        }

        .navbar h1 {
            margin: 0;
        }

        .navbar a {
            text-decoration: none;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            background: #ff9800;
            margin-left: 10px;
            transition: 0.3s;
        }

        .navbar a:hover {
            background: #e68900;
        }

        .container {
            text-align: center;
            padding: 40px;
        }

        .games {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.2);
        }

        .card a {
            text-decoration: none;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .welcome {
            font-size: 18px;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <!-- <h1>Shield Power</h1> -->
   <img src="{% static 'games/images/GSP_Logo.png' %}" 
     alt="Shield Power Logo" 
     style="height: 60px;">
        <div>
            {% if user.is_authenticated %}
                <span class="welcome">Welcome {{ user.username }}</span>
                <a href="/logout/">Logout</a>
            {% else %}
                <a href="/login/">Login</a>
                <a href="/register/">Register</a>
            {% endif %}
        </div>
    </div>
     <div class="container">
        <h2>Choose Your Game</h2>
         <div class="games">
            {% for game in games %}
                <div class="card">
                    <img src="{% static game.image %}" alt="{{ game.name }}" style="width:100%; border-radius: 10px; margin-bottom: 15px;">

                    <a href="{% url 'play_game' game.id %}">
                        {{ game.name }}
                    </a>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
