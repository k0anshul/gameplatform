<!DOCTYPE html>
<html>
<head>
    <!-- <title>{{ game_name }}</title> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
        }

        .header {
            padding: 20px;
            background: rgba(0,0,0,0.3);
        }

        .timer {
            margin-top: 10px;
            font-size: 18px;
        }

        iframe {
            margin-top: 20px;
            width: 95%;
            height: 700px;
            border: none;
            border-radius: 12px;
            background: white;
        }

        .back-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 15px;
            background: #ff9800;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        .back-btn:hover {
            background: #e68900;
        }
    </style>
</head>

<body>

    <div class="header">
        <h2>{{ game_name }}</h2>
        <div class="timer">
            ⏳ Time left: <span id="timer">{{ remaining }}</span> seconds
        </div>
        <a class="back-btn" href="/">⬅ Back to Home</a>
    </div>

    <iframe src="{{ game_path }}"></iframe>

    <script>
        let timeLeft ="{{ remaining }}";
        const timerElement = document.getElementById("timer");

        const countdown = setInterval(() => {
            timeLeft--;
            timerElement.innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                alert("Session expired!");
                window.location.href = "/";
            }
        }, 1000);
    </script>

</body>
</html>
