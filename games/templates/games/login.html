<!DOCTYPE html>
<html>
<head>
    <title>Login - Shield Power</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .login-card {
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(15px);
            width: 320px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        .login-card h2 {
            margin-bottom: 20px;
        }

        .login-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
        }

        .login-card button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: #ff9800;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-card button:hover {
            background: #e68900;
        }

        .login-card a {
            color: #ffd54f;
            text-decoration: none;
        }

        .login-card a:hover {
            text-decoration: underline;
        }

        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: white;
            background: rgba(0,0,0,0.3);
            padding: 8px 12px;
            border-radius: 8px;
        }

        .back-home:hover {
            background: rgba(0,0,0,0.5);
        }
    </style>
</head>

<body>

    <a href="/" class="back-home">⬅ Home</a>

    <div class="login-card">
        <h2>🔐 Login</h2>

        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <p style="margin-top:15px;">
            Don't have an account?
            <a href="{% url 'register' %}">Register here</a>
        </p>
    </div>

</body>
</html>
